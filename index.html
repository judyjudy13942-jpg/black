<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>儲值記帳控制台</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="儲值記帳">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --border: #242735;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊陰影 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .dashboard {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1e2030 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
        }

        .dashboard h2 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .quota-display {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .quota-negative {
            color: var(--danger) !important;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .quota-positive {
            color: var(--text-main);
        }

        .meta-info {
            display: flex;
            justify-content: space-around;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .meta-info span strong {
            color: var(--text-main);
            display: block;
            font-size: 1.1rem;
            margin-top: 0.2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: #1e202e;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: bold;
            outline: none;
            text-align: center;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .item-info .item-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .item-info .item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .item-amount {
            font-weight: 700;
        }

        .amount-expense { color: var(--text-main); }
        .amount-income { color: var(--success); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <h2>當月可用餘額</h2>
        <div id="quotaDisplay" class="quota-display quota-positive">$3,000</div>
        
        <div class="meta-info">
            <span>本月基本<strong id="baseQuota">$1,500</strong></span>
            <span>上月結轉<strong id="carryOver">$1,500</strong></span>
            <span>本月已花<strong id="totalExpense">$0</strong></span>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-calculator" style="color: var(--primary);"></i> 輸入記帳金額</h3>
        <form id="transactionForm">
            <div class="form-group">
                <label for="amount">金額 (消費請輸入正數 / 儲值請輸入負數)</label>
                <input type="number" id="amount" inputmode="numeric" pattern="[0-9]*" placeholder="$ 0" required autocomplete="off">
            </div>
            <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> 確認送出</button>
        </form>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-history" style="color: var(--text-muted);"></i> 本月明細</h3>
        <ul id="historyList" class="history-list">
            <li class="history-item" style="color: var(--text-muted); text-align: center; justify-content: center;">暫無紀錄</li>
        </ul>
    </div>
</div>

<script>
    (function() {
        // 🌟 防止 iOS 在 Standalone 模式下點擊連結開啟新分頁
        if (("standalone" in window.navigator) && window.navigator.standalone) {
            var noddy, remotes = false;
            document.addEventListener('click', function(event) {
                noddy = event.target;
                while (noddy.nodeName !== "A" && noddy.nodeName !== "HTML") {
                    noddy = noddy.parentNode;
                }
                if ('href' in noddy && noddy.href.indexOf('http') !== -1 && (noddy.href.indexOf(document.location.host) !== -1 || remotes)) {
                    event.preventDefault();
                    document.location.href = noddy.href;
                }
            }, false);
        }

        const URL = "https://muolweoqrmgsvkzibwrj.supabase.co"; 
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11b2x3ZW9xcm1nc3Zremlid3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDc4MjEsImV4cCI6MjA5NDY4MzgyMX0.R9Unat5-wArSmO4Ew9xHv29IM87Q0Tgofv7yOsjKBP8";

        if (!window.supabase) {
            console.error("Supabase SDK 載入失敗");
            return;
        }
        const db = window.supabase.createClient(URL, KEY);

        let myProfileId = ""; 
        
        let state = {
            baseQuota: 1500,
            carryOver: 1500, 
            totalExpense: 0,
            transactions: []
        };

        async function initData() {
            try {
                const { data: profileData, error: pError } = await db
                    .from('profiles')
                    .select('*')
                    .limit(1);
                
                if (pError) throw pError;
                
                if (profileData && profileData.length > 0) {
                    myProfileId = profileData[0].id;
                    state.baseQuota = parseFloat(profileData[0].monthly_quota) || 1500;
                    state.carryOver = profileData[0].carry_over !== undefined && profileData[0].carry_over !== 0 ? parseFloat(profileData[0].carry_over) : 1500;
                }

                const { data: transData, error: tError } = await db
                    .from('transactions')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (tError) throw tError;

                if (transData) {
                    state.transactions = transData.map(item => ({
                        title: item.title || (item.amount > 0 ? "記帳支出" : "帳戶儲值"),
                        amount: parseFloat(item.amount),
                        date: new Date(item.created_at).toLocaleDateString('zh-TW')
                    }));
                    state.totalExpense = transData.reduce((sum, item) => sum + parseFloat(item.amount), 0);
                }

                updateUI();
            } catch (error) {
                console.error("資料庫連線或讀取失敗：", error.message);
            }
        }

        function updateUI() {
            const currentQuota = state.baseQuota + state.carryOver - state.totalExpense;
            const quotaDisplay = document.getElementById('quotaDisplay');
            
            if (currentQuota < 0) {
                quotaDisplay.innerText = `-$${Math.abs(currentQuota).toLocaleString()}`;
                quotaDisplay.className = "quota-display quota-negative";
            } else {
                quotaDisplay.innerText = `$${currentQuota.toLocaleString()}`;
                quotaDisplay.className = "quota-display quota-positive";
            }

            document.getElementById('baseQuota').innerText = `$${state.baseQuota.toLocaleString()}`;
            
            const carryOverEl = document.getElementById('carryOver');
            carryOverEl.innerText = state.carryOver < 0 ? `-$${Math.abs(state.carryOver).toLocaleString()}` : `$${state.carryOver.toLocaleString()}`;
            if(state.carryOver < 0) { carryOverEl.style.color = "var(--danger)"; } else { carryOverEl.style.color = "var(--text-main)"; }

            document.getElementById('totalExpense').innerText = `$${state.totalExpense.toLocaleString()}`;

            const listEl = document.getElementById('historyList');
            if (state.transactions.length === 0) {
                listEl.innerHTML = `<li class="history-item" style="color: var(--text-muted); justify-content: center;">暫無紀錄</li>`;
                return;
            }

            listEl.innerHTML = state.transactions.map(item => `
                <li class="history-item">
                    <div class="item-info">
                        <div class="item-title">${item.title}</div>
                        <div class="item-date">${item.date}</div>
                    </div>
                    <div class="item-amount ${item.amount > 0 ? 'amount-expense' : 'amount-income'}">
                        ${item.amount > 0 ? `-$${item.amount.toLocaleString()}` : `+$${Math.abs(item.amount).toLocaleString()}`}
                    </div>
                </li>
            `).join('');
        }

        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const autoTitle = amount > 0 ? "記帳支出" : "帳戶儲值";

            try {
                const { error } = await db
                    .from('transactions')
                    .insert([{ user_id: myProfileId ? myProfileId : null, title: autoTitle, amount: amount }]);

                if (error) throw error;

                const newTotalExpense = state.totalExpense + amount;
                const currentQuota = state.baseQuota + state.carryOver - newTotalExpense;
                
                if (currentQuota < 0 && amount > 0) {
                    await callSupabaseEdgeFunction(amount, currentQuota);
                }

                document.getElementById('amount').value = '';
                await initData(); 

            } catch (error) {
                alert("記帳失敗：" + error.message);
            }
        });

        async function callSupabaseEdgeFunction(amount, currentQuota) {
            console.log("🚨 餘額透支，正在呼叫後端 swift-function 發送 LINE 通知...");
            try {
                const response = await fetch(`${URL}/functions/v1/swift-function`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${KEY}`
                    },
                    body: JSON.stringify({ amount, currentQuota })
                });
                
                if (!response.ok) {
                    throw new Error(`伺服器回應錯誤狀態碼: ${response.status}`);
                }
                
                const resData = await response.json();
                console.log("✅ 後端 Edge Function 執行結果：", resData);
            } catch (err) {
                console.error("呼叫後端通知失敗：", err);
            }
        }

        initData();
    })();
</script>
</body>
</html>
