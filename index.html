<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儲值記帳控制台</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1; /* 科技藍紫 */
            --primary-hover: #4f46e5;
            --danger: #ef4444; /* 負數警告紅 */
            --success: #10b981; /* 儲值綠 */
            --border: #242735;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* 主看板 */
        .dashboard {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1e2030 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
        }

        .dashboard h2 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .quota-display {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        /* 當額度變成負數時的樣式 */
        .quota-negative {
            color: var(--danger) !important;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .quota-positive {
            color: var(--text-main);
        }

        .meta-info {
            display: flex;
            justify-content: space-around;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .meta-info span strong {
            color: var(--text-main);
            display: block;
            font-size: 1.1rem;
            margin-top: 0.2rem;
        }

        /* 表單與清單卡片 */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 輸入框設計 */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: #1e202e;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* 按鈕 */
        .btn {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        /* 歷史紀錄列表 */
        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .item-info .item-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .item-info .item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .item-amount {
            font-weight: 700;
        }

        .amount-expense { color: var(--text-main); }
        .amount-income { color: var(--success); }

        /* 滾動條優化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <h2>當月可用餘額</h2>
        <div id="quotaDisplay" class="quota-display quota-positive">$1,500</div>
        
        <div class="meta-info">
            <span>本月基本<strong id="baseQuota">$1,500</strong></span>
            <span>上月結轉<strong id="carryOver">$0</strong></span>
            <span>本月已花<strong id="totalExpense">$0</strong></span>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-plus-circle" style="color: var(--primary);"></i> 新增記帳</h3>
        <form id="transactionForm">
            <div class="form-group">
                <label for="title">項目名稱</label>
                <input type="text" id="title" placeholder="例如：手機儲值、遊戲課金..." required>
            </div>
            <div class="form-group">
                <label for="amount">金額 (消費輸入正數 / 儲值增加額度輸入負數)</label>
                <input type="number" id="amount" placeholder="金額" required>
            </div>
            <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> 送出記帳</button>
        </form>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-history" style="color: var(--text-muted);"></i> 本月明細</h3>
        <ul id="historyList" class="history-list">
            <li class="history-item" style="color: var(--text-muted); text-align: center; justify-content: center;">暫無紀錄</li>
        </ul>
    </div>
</div>

<script>
    // 🌟 核心修正 2：移除網址結尾的 /rest/v1/
    const SUPABASE_URL = "https://muolweoqrmgsvkzibwrj.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11b2x3ZW9xcm1nc3Zremlid3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDc4MjEsImV4cCI6MjA5NDY4MzgyMX0.R9Unat5-wArSmO4Ew9xHv29IM87Q0Tgofv7yOsjKBP8";

    // 🌟 核心修正 3：使用 window.supabase 呼叫 SDK，徹底解決 "already been declared" 報錯
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myProfileId = ""; 

    let state = {
        baseQuota: 1500,
        carryOver: 0,
        totalExpense: 0,
        transactions: []
    };

    // 從 Supabase 初始化讀取資料
    async function initData() {
        try {
            // A. 抓取 profiles 資料（取得基本額度與上月結餘）
            const { data: profileData, error: pError } = await supabase
                .from('profiles')
                .select('*')
                .limit(1);
            
            if (pError) throw pError;
            
            if (profileData && profileData.length > 0) {
                myProfileId = profileData[0].id; // 記錄資料庫中的 UUID
                state.baseQuota = parseFloat(profileData[0].monthly_quota) || 1500;
                state.carryOver = parseFloat(profileData[0].carry_over) || 0;
            }

            // B. 抓取 transactions 記帳明細
            const { data: transData, error: tError } = await supabase
                .from('transactions')
                .select('*')
                .order('created_at', { ascending: false }); // 最新紀錄排在最前面
            
            if (tError) throw tError;

            if (transData) {
                state.transactions = transData.map(item => ({
                    title: item.title,
                    amount: parseFloat(item.amount),
                    date: new Date(item.created_at).toLocaleDateString('zh-TW')
                }));

                // 計算本月總消費（將所有正數的消費金額加總，扣除負數的儲值）
                state.totalExpense = transData.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            }

            // 重新更新網頁畫面
            updateUI();

        } catch (error) {
            console.error("讀取 Supabase 資料出錯：", error.message);
            alert("資料讀取失敗，請檢查 Supabase 設定！");
        }
    }

    // 畫面渲染函數
    function updateUI() {
        // 公式：可用額度 = 基本額度 + 上月結餘 - 本月總消費
        const currentQuota = state.baseQuota + state.carryOver - state.totalExpense;
        const quotaDisplay = document.getElementById('quotaDisplay');
        
        // 顯示千分位格式的金額
        quotaDisplay.innerText = `$${currentQuota.toLocaleString()}`;
        
        // 看板變成負數時的變色邏輯
        if (currentQuota < 0) {
            quotaDisplay.className = "quota-display quota-negative";
        } else {
            quotaDisplay.className = "quota-display quota-positive";
        }

        document.getElementById('baseQuota').innerText = `$${state.baseQuota.toLocaleString()}`;
        document.getElementById('carryOver').innerText = `$${state.carryOver.toLocaleString()}`;
        document.getElementById('totalExpense').innerText = `$${state.totalExpense.toLocaleString()}`;

        const listEl = document.getElementById('historyList');
        if (state.transactions.length === 0) {
            listEl.innerHTML = `<li class="history-item" style="color: var(--text-muted); justify-content: center;">暫無紀錄</li>`;
            return;
        }

        listEl.innerHTML = state.transactions.map(item => `
            <li class="history-item">
                <div class="item-info">
                    <div class="item-title">${item.title}</div>
                    <div class="item-date">${item.date}</div>
                </div>
                <div class="item-amount ${item.amount > 0 ? 'amount-expense' : 'amount-income'}">
                    ${item.amount > 0 ? `-$${item.amount.toLocaleString()}` : `+$${Math.abs(item.amount).toLocaleString()}`}
                </div>
            </li>
        `).join('');
    }

    // 表單送出事件（寫入資料到 Supabase）
    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value;
        const amount = parseFloat(document.getElementById('amount').value);

        try {
            // 將資料 Insert 到 Supabase
            const { data, error } = await supabase
                .from('transactions')
                .insert([
                    { 
                        user_id: myProfileId ? myProfileId : null, 
                        title: title, 
                        amount: amount 
                    }
                ]);

            if (error) throw error;

            // 檢查是否爆額度並觸發 LINE 通知
            const currentQuota = state.baseQuota + state.carryOver - (state.totalExpense + amount);
            if (currentQuota < 0) {
                sendLineNotification(title, amount, currentQuota);
            }

            // 清空輸入框並重新載入最新資料
            document.getElementById('title').value = '';
            document.getElementById('amount').value = '';
            await initData(); 

        } catch (error) {
            console.error("寫入資料失敗：", error.message);
            alert("記帳失敗：" + error.message);
        }
    });

    // LINE 通知發送邏輯
    function sendLineNotification(title, amount, currentQuota) {
        const message = `\n⚠️ 記帳爆表通知！\n項目：${title}\n金額：$${amount}\n目前剩餘額度：$${currentQuota} (已成負數)`;
        console.log("🚨 觸發 LINE 通知：", message);
        // 這裡後續可以安全串接 LINE Notify API 或是 LINE Message API 喔！
    }

    // 網頁加載完畢後自動執行讀取
    initData();
</script>
</body>
</html>
