<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儲值記帳控制台</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --border: #242735;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .dashboard {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1e2030 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
        }

        .dashboard h2 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .quota-display {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .quota-negative {
            color: var(--danger) !important;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .quota-positive {
            color: var(--text-main);
        }

        .meta-info {
            display: flex;
            justify-content: space-around;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .meta-info span strong {
            color: var(--text-main);
            display: block;
            font-size: 1.1rem;
            margin-top: 0.2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: #1e202e;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: bold;
            outline: none;
            text-align: center;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .item-info .item-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .item-info .item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .item-amount {
            font-weight: 700;
        }

        .amount-expense { color: var(--text-main); }
        .amount-income { color: var(--success); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <h2>當月可用餘額</h2>
        <div id="quotaDisplay" class="quota-display quota-positive">$3,000</div>
        
        <div class="meta-info">
            <span>本月基本<strong id="baseQuota">$1,500</strong></span>
            <span>上月結轉<strong id="carryOver">$1,500</strong></span>
            <span>本月已花<strong id="totalExpense">$0</strong></span>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-calculator" style="color: var(--primary);"></i> 輸入記帳金額</h3>
        <form id="transactionForm">
            <div class="form-group">
                <label for="amount">金額 (消費請輸入正數 / 儲值請輸入負數)</label>
                <input type="number" id="amount" placeholder="$ 0" required autocomplete="off">
            </div>
            <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> 確認送出</button>
        </form>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-history" style="color: var(--text-muted);"></i> 本月明細</h3>
        <ul id="historyList" class="history-list">
            <li class="history-item" style="color: var(--text-muted); text-align: center; justify-content: center;">暫無紀錄</li>
        </ul>
    </div>
</div>

<script>
    (function() {
        // 1. Supabase 設定
        const URL = "https://muolweoqrmgsvkzibwrj.supabase.co"; 
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11b2x3ZW9xcm1nc3Zremlid3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDc4MjEsImV4cCI6MjA5NDY4MzgyMX0.R9Unat5-wArSmO4Ew9xHv29IM87Q0Tgofv7yOsjKBP8";

        // 2. LINE Messaging API 設定 (已帶入您提供的 Token 與兩個 User ID)
        const LINE_TOKEN = "SYX9cUJzQw+ZOz6I0YNv7maPaQFSwbrLvo9l+ZnHZnI0iCHGkr8tx+WLwow9R5FKkR9tFm6813nuKA71FBDXnw3emLIVzMP3ayaFZMsrflviGRUqZARHHS6DNwBP8LeqEUyLWlDgmxRDur0VDO1RfwdB04t89/1O/w1cDnyilFU=";
        const LINE_USER_IDS = [
            "U5df583de4e4daea0f30bc1e5ec2a14b6",
            "U7dc91fb896afeab8ff60fe2359b501cb"
        ];

        if (!window.supabase) {
            console.error("Supabase SDK 載入失敗");
            return;
        }
        const db = window.supabase.createClient(URL, KEY);

        let myProfileId = ""; 
        
        // 狀態初始化：依要求預設改成本月 1500 + 上月 1500 = 起始 3000 元
        let state = {
            baseQuota: 1500,
            carryOver: 1500, 
            totalExpense: 0,
            transactions: []
        };

        async function initData() {
            try {
                // A. 讀取 profiles
                const { data: profileData, error: pError } = await db
                    .from('profiles')
                    .select('*')
                    .limit(1);
                
                if (pError) throw pError;
                
                if (profileData && profileData.length > 0) {
                    myProfileId = profileData[0].id;
                    state.baseQuota = parseFloat(profileData[0].monthly_quota) || 1500;
                    // 如果資料庫內的值是 0，前端自動套用 1500 的預設遞延額度
                    state.carryOver = profileData[0].carry_over ? parseFloat(profileData[0].carry_over) : 1500;
                }

                // B. 讀取 transactions
                const { data: transData, error: tError } = await db
                    .from('transactions')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (tError) throw tError;

                if (transData) {
                    state.transactions = transData.map(item => ({
                        title: item.title || (item.amount > 0 ? "記帳支出" : "帳戶儲值"),
                        amount: parseFloat(item.amount),
                        date: new Date(item.created_at).toLocaleDateString('zh-TW')
                    }));
                    state.totalExpense = transData.reduce((sum, item) => sum + parseFloat(item.amount), 0);
                }

                updateUI();
            } catch (error) {
                console.error("資料庫連線或讀取失敗：", error.message);
            }
        }

        function updateUI() {
            const currentQuota = state.baseQuota + state.carryOver - state.totalExpense;
            const quotaDisplay = document.getElementById('quotaDisplay');
            
            quotaDisplay.innerText = `$${currentQuota.toLocaleString()}`;
            
            if (currentQuota < 0) {
                quotaDisplay.className = "quota-display quota-negative";
            } else {
                quotaDisplay.className = "quota-display quota-positive";
            }

            document.getElementById('baseQuota').innerText = `$${state.baseQuota.toLocaleString()}`;
            document.getElementById('carryOver').innerText = `$${state.carryOver.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `$${state.totalExpense.toLocaleString()}`;

            const listEl = document.getElementById('historyList');
            if (state.transactions.length === 0) {
                listEl.innerHTML = `<li class="history-item" style="color: var(--text-muted); justify-content: center;">暫無紀錄</li>`;
                return;
            }

            listEl.innerHTML = state.transactions.map(item => `
                <li class="history-item">
                    <div class="item-info">
                        <div class="item-title">${item.title}</div>
                        <div class="item-date">${item.date}</div>
                    </div>
                    <div class="item-amount ${item.amount > 0 ? 'amount-expense' : 'amount-income'}">
                        ${item.amount > 0 ? `-$${item.amount.toLocaleString()}` : `+$${Math.abs(item.amount).toLocaleString()}`}
                    </div>
                </li>
            `).join('');
        }

        // 表單送出
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const autoTitle = amount > 0 ? "記帳支出" : "帳戶儲值";

            try {
                const { error } = await db
                    .from('transactions')
                    .insert([
                        { 
                            user_id: myProfileId ? myProfileId : null, 
                            title: autoTitle, 
                            amount: amount 
                        }
                    ]);

                if (error) throw error;

                // 計算扣除此筆後的最新餘額
                const currentQuota = state.baseQuota + state.carryOver - (state.totalExpense + amount);
                
                // 只有在可用金額小於 0 且是「支出 (amount > 0)」的時候才觸發 LINE 通知
                if (currentQuota < 0 && amount > 0) {
                    sendLineNotification(amount, currentQuota);
                }

                document.getElementById('amount').value = '';
                await initData(); 

            } catch (error) {
                alert("記帳失敗：" + error.message);
            }
        });

        // 🌟 串接 LINE Messaging API Multicast (多人同步發送) 功能
        async function sendLineNotification(amount, currentQuota) {
            const messageText = `⚠️ 記帳預算爆表通知！\n\n剛剛新增支出：$${amount} 元\n目前可用餘額已透支：$${currentQuota} 元\n\n預算已見底，請注意控制花費！`;
            
            console.log("🚨 正在發送 LINE 官方帳號通知...");

            try {
                // 使用 LINE 官方提供的中轉 Proxy 服務，避開前端直接發送造成的 CORS 瀏覽器安全阻擋
                // 利用 LINE Messaging API 的 multicast 節點，可同時傳給多個用戶
                const response = await fetch("https://cors-anywhere.herokuapp.com/https://api.line.me/v2/bot/message/multicast", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${LINE_TOKEN}`
                    },
                    body: JSON.stringify({
                        to: LINE_USER_IDS, // 👈 同時發送給這兩個 User ID
                        messages: [
                            {
                                type: "text",
                                text: messageText
                            }
                        ]
                    })
                });

                if (response.ok) {
                    console.log("✅ LINE 預算見底通知發送成功！");
                } else {
                    const errData = await response.json();
                    console.error("❌ LINE 發送失敗原因：", errData);
                }
            } catch (err) {
                console.error("網路連線異常，無法發送 LINE 通知：", err);
            }
        }

        initData();
    })();
</script>
</body>
</html>
